<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text & Sentiment Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto p-6">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Local Text Analytics Engine</h1>
            <p class="text-slate-500 mt-2">Zero datasets or APIs required. Enter text below to analyze on the fly.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-md flex flex-col gap-4">
                <h2 class="text-lg font-semibold text-slate-700">Paste Text Here</h2>
                <textarea id="textInput" class="w-full h-64 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Type or paste your text here (e.g., 'This movie was absolutely amazing! I loved the acting and the plot was spectacular. However, the ending was bad and terrible.')"></textarea>
                <button onclick="analyzeText()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
                    Analyze Data
                </button>
            </div>

            <div class="lg:col-span-2 flex flex-col gap-6">
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-xl shadow-md text-center">
                        <span class="text-sm text-slate-400 block font-medium">Word Count</span>
                        <span id="wordCount" class="text-2xl font-bold text-slate-800">0</span>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-md text-center">
                        <span class="text-sm text-slate-400 block font-medium">Unique Words</span>
                        <span id="uniqueWords" class="text-2xl font-bold text-slate-800">0</span>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-md text-center">
                        <span class="text-sm text-slate-400 block font-medium">Sentiment Score</span>
                        <span id="sentimentScore" class="text-2xl font-bold text-slate-800">Neutral</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h3 class="text-lg font-semibold text-slate-700 mb-4">Top 5 Most Frequent Words</h3>
                    <div class="relative h-64">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        // Small built-in dictionaries for local analytical lookup
        const stopWords = new Set(['the', 'and', 'a', 'to', 'of', 'in', 'is', 'it', 'you', 'that', 'this', 'for', 'on', 'with', 'as', 'at', 'by', 'an', 'be', 'was', 'were', 'or']);
        const positiveWords = new Set(['amazing', 'great', 'love', 'loved', 'awesome', 'good', 'excellent', 'spectacular', 'happy', 'fantastic', 'wonderful', 'best', 'beautiful']);
        const negativeWords = new Set(['bad', 'terrible', 'worst', 'sad', 'hate', 'hated', 'boring', 'poor', 'awful', 'horrible', 'ugly', 'annoyed', 'disappointing']);

        function analyzeText() {
            const rawText = document.getElementById('textInput').value;
            
            // Step 1: Data Cleaning & Tokenization
            const cleanWords = rawText.toLowerCase()
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'\n]/g, " ")
                .split(/\s+/)
                .filter(word => word.length > 0);

            if (cleanWords.length === 0) return alert("Please enter some text to analyze!");

            // Step 2: Metric Calculations
            const totalWords = cleanWords.length;
            const wordFrequencies = {};
            let sentimentValue = 0;

            cleanWords.forEach(word => {
                // Word frequencies (filtering out common stop words)
                if (!stopWords.has(word)) {
                    wordFrequencies[word] = (wordFrequencies[word] || 0) + 1;
                }
                
                // Sentiment Scoring
                if (positiveWords.has(word)) sentimentValue++;
                if (negativeWords.has(word)) sentimentValue--;
            });

            const uniqueWordCount = new Set(cleanWords).size;

            // Step 3: Format Sentiment Output
            let sentimentResult = "Neutral 😐";
            let sentimentColor = "text-slate-800";
            if (sentimentValue > 0) {
                sentimentResult = `Positive (+${sentimentValue}) 😊`;
                sentimentColor = "text-emerald-600";
            } else if (sentimentValue < 0) {
                sentimentResult = `Negative (${sentimentValue}) ☹️`;
                sentimentColor = "text-rose-600";
            }

            // Update UI text fields
            document.getElementById('wordCount').innerText = totalWords;
            document.getElementById('uniqueWords').innerText = uniqueWordCount;
            const sentimentEl = document.getElementById('sentimentScore');
            sentimentEl.innerText = sentimentResult;
            sentimentEl.className = `text-2xl font-bold ${sentimentColor}`;

            // Step 4: Prep Data for Visualizing Top 5 Words
            const sortedWords = Object.entries(wordFrequencies)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const labels = sortedWords.map(item => item[0]);
            const dataPoints = sortedWords.map(item => item[1]);

            // Step 5: Render or Update Chart.js
            if (myChart) myChart.destroy(); // Clear old chart data

            const ctx = document.getElementById('chartCanvas').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Word Frequency',
                        data: dataPoints,
                        backgroundColor: 'rgba(59, 130, 246, 0.7)',
                        borderColor: 'rgb(59, 130, 246)',
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
